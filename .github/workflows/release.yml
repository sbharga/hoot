name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: hoot-linux-x86_64
            bin_name: hoot-server
          - os: macos-13
            target: x86_64-apple-darwin
            asset_name: hoot-macos-x86_64
            bin_name: hoot-server
          - os: macos-14
            target: aarch64-apple-darwin
            asset_name: hoot-macos-arm64
            bin_name: hoot-server
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: hoot-windows-x86_64
            bin_name: hoot-server.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          npm install
          npm --prefix frontend install

      - name: Build frontend
        run: npm --prefix frontend run build

      - name: Build backend
        run: cargo build --release -p hoot-server --target ${{ matrix.target }}

      - name: Stage release package
        shell: bash
        run: |
          set -euo pipefail
          stage="staging/${{ matrix.asset_name }}"
          mkdir -p "$stage/frontend"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin_name }}" "$stage/"
          cp -r frontend/dist "$stage/frontend/dist"
          cp -r content "$stage/content"
          cp README.md "$stage/"
          echo "STAGE_DIR=$stage" >> "$GITHUB_ENV"

      - name: Archive (zip, Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd staging
          7z a "../${{ matrix.asset_name }}.zip" "${{ matrix.asset_name }}"

      - name: Archive (tar.gz, Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd staging
          tar czf "../${{ matrix.asset_name }}.tar.gz" "${{ matrix.asset_name }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            ${{ matrix.asset_name }}.zip
            ${{ matrix.asset_name }}.tar.gz
          if-no-files-found: ignore

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          draft: false
          generate_release_notes: true
